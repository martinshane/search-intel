[build]
builder = "DOCKERFILE"
dockerfilePath = "web/Dockerfile"

# Build context must be repo root so COPY web/ works
# Railway sets this automatically when dockerfilePath is specified

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
