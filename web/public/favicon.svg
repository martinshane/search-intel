<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Bar chart (3 bars representing search metrics) -->
  <rect x="5" y="18" width="4" height="8" rx="1" fill="url(#bars)" opacity="0.7"/>
  <rect x="11" y="12" width="4" height="14" rx="1" fill="url(#bars)" opacity="0.85"/>
  <rect x="17" y="8" width="4" height="18" rx="1" fill="url(#bars)"/>
  <!-- Magnifying glass (search intelligence) -->
  <circle cx="24" cy="10" r="4.5" fill="none" stroke="#f8fafc" stroke-width="1.8"/>
  <line x1="27.2" y1="13.2" x2="29.5" y2="15.5" stroke="#f8fafc" stroke-width="1.8" stroke-linecap="round"/>
</svg>